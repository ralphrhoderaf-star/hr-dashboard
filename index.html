<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PENRO Cebu — HR Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{--navy:#09182e;--accent:#3b82f6;--border:#e2e8f0;--surf:#fff;--surf2:#f8fafc;--text1:#0f172a;--text2:#64748b;--text3:#94a3b8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--surf2);color:var(--text1);font-size:13px;}
.loading{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;color:#fff;}
.loading.hidden{display:none;}
.hdr{background:var(--navy);padding:20px 28px;color:#fff;}
.hdr-title{font-size:16px;font-weight:500;}
.tabs{display:flex;background:var(--surf);padding:0 28px;border-bottom:1px solid var(--border);}
.tab{padding:12px 20px;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.dash-body{padding:24px 28px;}
.metric-cards{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px;}
.mc{background:var(--surf);padding:16px;border-radius:8px;border:1px solid var(--border);border-top:3px solid var(--accent);}
.mc-label{font-size:10px;color:var(--text3);text-transform:uppercase;margin-bottom:4px;}
.mc-value{font-size:24px;font-weight:600;}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.card{background:var(--surf);padding:20px;border-radius:8px;border:1px solid var(--border);}
.card-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;margin-bottom:15px;}
.wf-table{width:100%;border-collapse:collapse;}
.wf-table th{text-align:left;font-size:10px;color:var(--text3);padding-bottom:10px;border-bottom:1px solid var(--border);}
.wf-table td{padding:10px 0;border-bottom:1px solid #f1f5f9;}
.profile-body{display:grid;grid-template-columns:280px 1fr;height:calc(100vh - 120px);}
.sidebar{border-right:1px solid var(--border);background:var(--surf);overflow-y:auto;}
.si{padding:12px 16px;cursor:pointer;border-bottom:1px solid #f1f5f9;}
.si:hover{background:var(--surf2);}
.si.active{background:#eff6ff;border-right:3px solid var(--accent);}
.main-p{padding:30px;overflow-y:auto;}
.pf-card{background:var(--surf);padding:25px;border-radius:12px;border:1px solid var(--border);}
</style>
</head>
<body>

<div class="loading" id="loader">Fetching Data...</div>

<div class="hdr">
  <div class="hdr-title">PENRO CEBU — HR DASHBOARD</div>
</div>

<div class="tabs">
  <div class="tab active" onclick="setTab('dash',this)">Dashboard</div>
  <div class="tab" onclick="setTab('prof',this)">Profiles</div>
</div>

<div id="dash" class="dash-body">
  <div class="metric-cards" id="metrics"></div>
  <div class="dash-grid">
    <div class="card">
      <div class="card-title">Plantilla Overview</div>
      <table class="wf-table"><thead><tr><th>Office</th><th>Total</th><th>Filled</th></tr></thead><tbody id="table"></tbody></table>
    </div>
    <div class="card">
      <div class="card-title">Gender Distribution</div>
      <canvas id="genChart" height="200"></canvas>
    </div>
  </div>
</div>

<div id="prof" class="profile-body" style="display:none;">
  <div class="sidebar" id="list"></div>
  <div class="main-p" id="details">Select an employee.</div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbz7SXiPqXvG6c2pkAO8VdQM7l_AGKQITl7skb4q96LZD5jI2brTrGzXBHPysHOPaWgO/exec";
let DATA = {};

async function load(){
  try{
    const r = await fetch(URL);
    DATA = await r.json();
    render();
  }catch(e){ alert("Error loading data"); }
  document.getElementById("loader").classList.add("hidden");
}

function render(){
  const s = DATA.summary || {};
  const m = [
    {l:"Filled",v:s.totalFilled},{l:"Vacant",v:s.totalUnfilled},
    {l:"Retiring",v:s.retiringSoon},{l:"HMO",v:s.hmoEnrolled},{l:"Training",v:s.trainingSessions}
  ];
  document.getElementById("metrics").innerHTML = m.map(x=>`<div class="mc"><div class="mc-label">${x.l}</div><div class="mc-value">${x.v||0}</div></div>`).join("");
  
  const offices = ["PENRO Cebu","CENRO Cebu City","CENRO Argao"];
  document.getElementById("table").innerHTML = offices.map(o=>{
    const d = (s.byOffice||{})[o]||{total:0,filled:0};
    return `<tr><td>${o}</td><td>${d.total}</td><td>${d.filled}</td></tr>`;
  }).join("");

  new Chart(document.getElementById("genChart"),{type:"doughnut",data:{labels:["Male","Female"],datasets:[{data:[s.male,s.female],backgroundColor:["#3b82f6","#ec4899"]}]}});
  
  document.getElementById("list").innerHTML = DATA.employees.map((e,i)=>`<div class="si" onclick="view(${i})"><b>${e.name}</b><br><small>${e.position}</small></div>`).join("");
}

function view(i){
  const e = DATA.employees[i];
  document.getElementById("details").innerHTML = `<div class="pf-card"><h2>${e.name}</h2><p>${e.position}</p><hr style="margin:15px 0;opacity:0.2"><p><b>Office:</b> ${e.office}</p><p><b>Status:</b> ${e.status}</p><p><b>Service:</b> ${e.length_svc} years</p></div>`;
}

function setTab(t,el){
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  el.classList.add("active");
  document.getElementById("dash").style.display = t==="dash"?"block":"none";
  document.getElementById("prof").style.display = t==="prof"?"grid":"none";
}

window.onload = load;
</script>
</body>
</html>
